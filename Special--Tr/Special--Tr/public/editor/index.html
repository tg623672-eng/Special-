<!DOCTYPE html>
<html style="background-color: #050404">
  <head>
    <meta http-equiv="refresh" content="2; URL='editor.php'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/extensions/nebula/editor/assets/favicon.ico" />
    <title>SK Host Designer</title>
  </head>
  <body>
    <div class="content">
      <p style="color: white; text-align: center; font-size: 55px">
        <i class="bi bi-exclude"></i>
        <span style="font-weight: 600">Designer</span><br style="padding-bottom: 3px" />
        <svg width="30" height="30" stroke="#fff" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <style>
            .spinner_V8m1 {
              transform-origin: center;
              animation: spinner_zKoa 2s linear infinite;
            }
            .spinner_V8m1 circle {
              stroke-linecap: round;
              animation: spinner_YpZS 1.5s ease-in-out infinite;
            }
            @keyframes spinner_zKoa {
              100% {
                transform: rotate(360deg);
              }
            }
            @keyframes spinner_YpZS {
              0% {
                stroke-dasharray: 0 150;
                stroke-dashoffset: 0;
              }
              47.5% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -16;
              }
              95%,
              100% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -59;
              }
            }
          </style>
          <g class="spinner_V8m1"><circle cx="12" cy="12" r="9.5" fill="none" stroke-width="3"></circle></g>
        </svg>
      </p>
    </div>
    <div class="back">
      <a href="/admin/extensions" onclick="preventDefault(); window.location = document.referrer">
        <button class="back-button"><i class="bi bi-arrow-left" style="margin-right: 10px"></i> Back</button>
      </a>
    </div>

    <div class="shapes-container">
      <div class="animated-shape-1"></div>
      <div class="animated-shape-2"></div>
    </div>
  </body>
</html>
<style>
  @import url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
  body {
    font-family: 'Inter', sans-serif;
  }

  .content {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    z-index: 3;
  }

  .back {
    position: fixed;
    z-index: 2;
    top: 40px;
    left: 40px;
  }
  .back-button {
    color: white;
    font-size: 20px;
    background-color: #222222;
    border: none;
    border-radius: 12px;
    padding: 10px 25px;
    cursor: pointer;
  }
  .back a {
    cursor: pointer;
  }

  .shapes-container {
    filter: blur(25px);
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
  }

  .animated-shape-1 {
    position: fixed;
    top: calc(50% - 200px);
    left: calc(50% - 200px);
    width: 250px;
    height: 250px;
    background: radial-gradient(#4b68d1, #2042bf);
    border-radius: 1000px;
    filter: blur(15px);
    animation: animation-1 3s linear;
    animation-fill-mode: forwards;
  }
  .animated-shape-2 {
    position: fixed;
    bottom: calc(50% - 200px);
    right: calc(50% - 200px);
    width: 250px;
    height: 250px;
    background: radial-gradient(#e66465, #9198e5);
    border-radius: 1000px;
    filter: blur(25px);
    animation: animation-2 3s linear;
    animation-fill-mode: forwards;
  }

  .animated-shape-1,
  .animated-shape-2 {
    opacity: 0;
  }

  @keyframes animation-1 {
    0% {
      scale: 0.75;
      opacity: 0;
    }
    25% {
      scale: 1;
    }
    50% {
      opacity: 0.8;
      top: calc(50% - 100px);
      left: calc(50% - 100px);
    }
    100% {
      scale: 0.7;
      opacity: 0;
      top: calc(50%);
      left: calc(50%);
    }
  }
  @keyframes animation-2 {
    0% {
      scale: 0.75;
      opacity: 0;
    }
    25% {
      scale: 1;
    }
    50% {
      opacity: 0.8;
      bottom: calc(50% - 100px);
      right: calc(50% - 100px);
    }
    100% {
      scale: 0.7;
      opacity: 0;
      bottom: calc(50%);
      right: calc(50%);
    }
  }
</style>
